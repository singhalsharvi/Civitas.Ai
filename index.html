<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Civitas.Ai</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── THEME VARIABLES ── */
[data-theme="dark"]{
  --bg:#07101f;--s1:#0f1b2d;--s2:#162033;--bdr:#1e2f47;
  --tx:#F1F5F9;--tx2:#94A3B8;--tx3:#64748B;
  --card:#0d1929;--shadow:rgba(0,0,0,.4);
  --acc:#22D3EE;--acc2:#818CF8;--warn:#FBBF24;--dan:#F87171;--ok:#34D399;
  --chat-bg:#0f1b2d;--chat-user:#162033;--chat-bot:#1e2f47;
}
[data-theme="light"]{
  --bg:#f0f4f8;--s1:#ffffff;--s2:#f8fafc;--bdr:#e2e8f0;
  --tx:#0f172a;--tx2:#475569;--tx3:#94A3B8;
  --card:#ffffff;--shadow:rgba(0,0,0,.08);
  --acc:#0891b2;--acc2:#6366f1;--warn:#d97706;--dan:#dc2626;--ok:#059669;
  --chat-bg:#f8fafc;--chat-user:#e0f2fe;--chat-bot:#f1f5f9;
}

body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;min-height:100vh;transition:background .3s,color .3s}
h1,h2,h3{font-family:'Space Grotesk',sans-serif}
a{color:var(--acc)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}

/* ── THEME TOGGLE ── */
.theme-toggle{background:var(--s2);border:1px solid var(--bdr);color:var(--tx2);width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0}
.theme-toggle:hover{border-color:var(--acc);color:var(--acc)}

/* ── LANDING ── */
.land{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;position:relative;overflow:hidden}
.land::before{content:'';position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:700px;height:700px;background:radial-gradient(ellipse,rgba(34,211,238,.06) 0%,transparent 65%);pointer-events:none}
.land-top{position:absolute;top:16px;right:20px;display:flex;gap:8px}
.land-logo{font-size:17px;font-weight:700;display:flex;align-items:center;gap:7px;margin-bottom:44px}
.logo-dot{width:9px;height:9px;border-radius:50%;background:var(--acc);box-shadow:0 0 8px var(--acc)}
.land-eyebrow{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:#a78bfa;background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.2);padding:4px 12px;border-radius:20px;margin-bottom:18px;letter-spacing:.04em}
.edot{width:5px;height:5px;border-radius:50%;background:#a78bfa;animation:gp 2s infinite}
@keyframes gp{0%,100%{opacity:1}50%{opacity:.3}}
.land-title{font-size:clamp(32px,5.5vw,60px);font-weight:700;letter-spacing:-2px;line-height:1.05;margin-bottom:12px}
.land-title em{font-style:normal;background:linear-gradient(90deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.land-sub{font-size:15px;color:var(--tx2);max-width:460px;line-height:1.7;margin-bottom:48px}
.portal-cards{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;max-width:680px;width:100%}
.pcard{flex:1;min-width:270px;max-width:310px;background:var(--s1);border:1px solid var(--bdr);border-radius:20px;padding:28px 24px;cursor:pointer;transition:all .22s;text-align:left;position:relative;overflow:hidden}
.pcard::after{content:'';position:absolute;inset:0;opacity:0;transition:opacity .22s}
.pcard-c::after{background:radial-gradient(ellipse at top left,rgba(34,211,238,.06),transparent 70%)}
.pcard-g::after{background:radial-gradient(ellipse at top left,rgba(129,140,248,.06),transparent 70%)}
.pcard:hover{transform:translateY(-5px);box-shadow:0 20px 60px var(--shadow)}
.pcard:hover::after{opacity:1}
.pcard-c:hover{border-color:rgba(34,211,238,.35)}
.pcard-g:hover{border-color:rgba(129,140,248,.35)}
.pcard-icon{font-size:34px;margin-bottom:14px}
.pcard-title{font-size:19px;font-weight:700;margin-bottom:5px}
.pcard-sub{font-size:12px;color:var(--tx2);line-height:1.6;margin-bottom:16px}
.pcard-feats{display:flex;flex-direction:column;gap:5px;margin-bottom:20px}
.pcard-feat{font-size:12px;color:var(--tx2);display:flex;align-items:flex-start;gap:6px}
.pcard-feat::before{content:'✓';color:var(--ok);font-weight:700;flex-shrink:0;margin-top:1px}
.pcard-btn{width:100%;padding:11px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .18s}
.pcard-c .pcard-btn{background:var(--acc);color:#07101f}
.pcard-g .pcard-btn{background:var(--acc2);color:#fff}
.pcard-btn:hover{opacity:.9;transform:translateY(-1px)}

/* ── AUTH ── */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
.auth-box{background:var(--s1);border:1px solid var(--bdr);border-radius:18px;padding:30px;width:100%;max-width:390px;box-shadow:0 8px 40px var(--shadow)}
.auth-title{font-size:21px;font-weight:700;margin-bottom:3px}
.auth-sub{font-size:12px;color:var(--tx2);margin-bottom:22px}
.auth-demo{font-size:11px;color:var(--tx2);margin-top:14px;padding:10px 12px;background:var(--s2);border:1px solid var(--bdr);border-radius:8px;line-height:1.75}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:500;height:54px;background:var(--s1);backdrop-filter:blur(16px);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 16px;gap:12px;box-shadow:0 1px 12px var(--shadow)}
.nav-logo{font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px;white-space:nowrap;flex-shrink:0}
.nav-tabs{display:flex;gap:1px;flex:1;overflow-x:auto}
.ntab{background:none;border:none;color:var(--tx2);font-size:13px;font-weight:500;padding:6px 12px;border-radius:8px;cursor:pointer;transition:all .18s;font-family:'Inter',sans-serif;white-space:nowrap}
.ntab:hover{color:var(--tx);background:var(--s2)}
.ntab.on{color:var(--acc);background:rgba(34,211,238,.09)}
.ntab-g.on{color:var(--acc2);background:rgba(129,140,248,.09)}
.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.npbadge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
.badge-c{background:rgba(34,211,238,.1);color:var(--acc);border:1px solid rgba(34,211,238,.2)}
.badge-g{background:rgba(129,140,248,.1);color:var(--acc2);border:1px solid rgba(129,140,248,.2)}
.gbadge{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:#a78bfa;background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.2);padding:3px 9px;border-radius:20px}
.gbadge-dot{width:5px;height:5px;border-radius:50%;background:#a78bfa;animation:gp 2s infinite}

/* ── LAYOUT ── */
.page{max-width:1140px;margin:0 auto;padding:70px 16px 120px}
.ptitle{font-size:20px;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:7px}
.psub{font-size:13px;color:var(--tx2);margin-bottom:20px}
.shead{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.slbl{font-size:15px;font-weight:700;display:flex;align-items:center;gap:7px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--acc);display:inline-block}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;border:none;font-family:'Inter',sans-serif;line-height:1}
.btn-p{background:var(--acc);color:#07101f}
.btn-p:hover:not(:disabled){filter:brightness(1.1);transform:translateY(-1px)}
.btn-v{background:var(--acc2);color:#fff}
.btn-v:hover:not(:disabled){filter:brightness(1.1);transform:translateY(-1px)}
.btn-g{background:var(--s2);color:var(--tx);border:1px solid var(--bdr)}
.btn-g:hover:not(:disabled){border-color:var(--acc);color:var(--acc)}
.btn-dan{background:rgba(248,113,113,.1);color:var(--dan);border:1px solid rgba(248,113,113,.2)}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-fw{width:100%;justify-content:center}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ── FORM ── */
.fg{margin-bottom:11px}
.fl{font-size:11px;font-weight:700;color:var(--tx3);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.05em}
.fi,.fsel,.fta{width:100%;background:var(--s2);border:1px solid var(--bdr);border-radius:9px;padding:9px 12px;color:var(--tx);font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color .18s,background .2s}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--acc)}
.fsel{cursor:pointer}
.fsel option{background:var(--s1);color:var(--tx)}
.fta{resize:vertical;min-height:64px;line-height:1.6}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--bdr);border-radius:13px;padding:16px;transition:background .2s}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:11px}

/* ── CATEGORY GRID ── */
.catgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.catopt{background:var(--s2);border:2px solid var(--bdr);border-radius:11px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .18s}
.catopt:hover{border-color:var(--acc);transform:scale(1.02)}
.catopt.sel{border-color:var(--acc);background:rgba(34,211,238,.07)}
.cat-icon{font-size:22px;margin-bottom:4px}
.cat-lbl{font-size:11px;font-weight:600;color:var(--tx2)}
.catopt.sel .cat-lbl{color:var(--acc)}

/* ── MULTI-IMAGE UPLOAD ── */
.uzone{border:2px dashed var(--bdr);border-radius:12px;padding:28px 16px;text-align:center;cursor:pointer;position:relative;transition:all .18s}
.uzone:hover,.uzone.drag{border-color:var(--acc);background:rgba(34,211,238,.03)}
.uzone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.img-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.img-thumb{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1;background:var(--s2)}
.img-thumb img{width:100%;height:100%;object-fit:cover}
.img-thumb-rm{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.7);border:none;color:#fff;border-radius:4px;padding:2px 6px;cursor:pointer;font-size:11px;font-weight:700}
.img-add{border:2px dashed var(--bdr);border-radius:8px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:24px;color:var(--tx3);transition:all .18s;background:var(--s2);position:relative}
.img-add:hover{border-color:var(--acc);color:var(--acc)}
.img-add input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}

/* ── ISSUE CARD ── */
.icard{background:var(--card);border:1px solid var(--bdr);border-radius:13px;overflow:hidden;transition:border-color .18s,transform .18s,box-shadow .18s,background .2s}
.icard:hover{border-color:var(--acc);transform:translateY(-3px);box-shadow:0 12px 40px var(--shadow)}
.icard-imgs{display:flex;gap:2px;height:130px;overflow:hidden}
.icard-imgs .main-img{flex:2;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:36px;overflow:hidden}
.icard-imgs .main-img img{width:100%;height:100%;object-fit:cover}
.icard-imgs .side-imgs{flex:1;display:flex;flex-direction:column;gap:2px}
.icard-imgs .side-img{flex:1;background:var(--bdr);overflow:hidden;position:relative}
.icard-imgs .side-img img{width:100%;height:100%;object-fit:cover}
.icard-imgs .side-more{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700}
.hp-banner{background:linear-gradient(90deg,rgba(248,113,113,.15),transparent);border-bottom:1px solid rgba(248,113,113,.2);padding:4px 12px;font-size:11px;font-weight:700;color:var(--dan);display:flex;align-items:center;gap:5px}
.icard-body{padding:12px}
.imeta{display:flex;align-items:center;gap:5px;margin-bottom:7px;flex-wrap:wrap}
.bx{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.bHIGH{color:#FCA5A5;background:rgba(248,113,113,.12)}
.bMEDIUM{color:#FCD34D;background:rgba(251,191,36,.12)}
.bLOW{color:#6EE7B7;background:rgba(52,211,153,.12)}
.bopen{color:#FCA5A5;background:rgba(248,113,113,.1)}
.bprog{color:#FCD34D;background:rgba(251,191,36,.1)}
.bres{color:#6EE7B7;background:rgba(52,211,153,.1)}
.icard-title{font-size:13px;font-weight:600;margin-bottom:4px;line-height:1.4}
.icard-loc{font-size:11px;color:var(--tx2);margin-bottom:7px}
.icard-bar{height:3px;background:var(--s2);border-radius:2px;margin-bottom:5px;overflow:hidden}
.icard-bar-fl{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--acc2),var(--acc))}
.govtresp{background:rgba(129,140,248,.08);border:1px solid rgba(129,140,248,.18);border-radius:7px;padding:7px 10px;margin-top:6px;font-size:11px;color:var(--tx2);line-height:1.6}
.govtresp strong{color:var(--acc2)}
.icard-foot{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--bdr);padding-top:8px;margin-top:6px;gap:6px;flex-wrap:wrap}
.vbtn{background:var(--s2);border:1px solid var(--bdr);color:var(--tx2);font-size:12px;font-weight:600;padding:4px 10px;border-radius:7px;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:4px;font-family:'Inter',sans-serif}
.vbtn:hover,.vbtn.on{background:rgba(34,211,238,.1);border-color:var(--acc);color:var(--acc)}
.igrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:13px}

/* ── AI BOX ── */
.aibox{background:linear-gradient(135deg,rgba(129,140,248,.07),rgba(34,211,238,.04));border:1px solid rgba(129,140,248,.2);border-radius:11px;padding:13px}
.aihdr{font-size:11px;font-weight:700;color:var(--acc2);margin-bottom:10px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.07em}
.airow{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid rgba(129,140,248,.1)}
.airow:last-child{border-bottom:none}
.aikey{color:var(--tx2)}
.aival{font-weight:600;color:var(--tx)}
.aival.HIGH{color:var(--dan)}
.aival.MEDIUM{color:var(--warn)}
.aival.LOW{color:var(--ok)}
.aidesc{font-size:12px;color:var(--tx2);line-height:1.6;margin-top:8px;padding-top:8px;border-top:1px solid rgba(129,140,248,.1)}
.aipulse{width:6px;height:6px;border-radius:50%;background:var(--acc2);animation:gp 1.5s infinite;flex-shrink:0}
.thinking{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--acc2);padding:22px 0;justify-content:center;flex-direction:column}
.tdots span{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--acc2);animation:bk 1.3s infinite;margin:0 2px}
.tdots span:nth-child(2){animation-delay:.22s}.tdots span:nth-child(3){animation-delay:.44s}
@keyframes bk{0%,80%,100%{opacity:.15}40%{opacity:1}}

/* ── DUPLICATE WARNING ── */
.dup-card{background:var(--s2);border:1px solid var(--bdr);border-radius:9px;padding:11px;margin-bottom:8px;transition:border-color .18s}
.dup-card:hover{border-color:var(--acc)}
.dup-title{font-size:13px;font-weight:600;margin-bottom:3px}
.dup-meta{font-size:11px;color:var(--tx2);margin-bottom:7px}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:700;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadein .2s ease}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.modal{background:var(--s1);border:1px solid var(--bdr);border-radius:17px;padding:20px;max-width:500px;width:100%;max-height:92vh;overflow-y:auto;animation:slidein .25s ease}
@keyframes slidein{from{transform:translateY(20px);opacity:0}to{transform:none;opacity:1}}
.mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.mtitle{font-size:15px;font-weight:700}
.mclose{background:var(--s2);border:1px solid var(--bdr);color:var(--tx2);width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .18s}
.mclose:hover{border-color:var(--dan);color:var(--dan)}
.steps{display:flex;gap:4px;margin-bottom:15px}
.sdot{height:3px;flex:1;border-radius:2px;background:var(--bdr);transition:background .3s}
.sdot.done{background:var(--acc)}

/* ── MAP ── */
.leaflet-container{background:var(--s2) !important}
.mapwrap{background:var(--card);border:1px solid var(--bdr);border-radius:13px;overflow:hidden}
.maptbar{padding:10px 13px;border-bottom:1px solid var(--bdr);display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.fchip{background:var(--s2);border:1px solid var(--bdr);color:var(--tx2);font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;cursor:pointer;transition:all .18s;font-family:'Inter',sans-serif}
.fchip.on{border-color:var(--acc);color:var(--acc);background:rgba(34,211,238,.08)}
.mapinfo{padding:9px 13px;border-top:1px solid var(--bdr);font-size:11px;color:var(--tx2);display:flex;gap:12px;flex-wrap:wrap;align-items:center}

/* ── CHATBOT ── */
.chat-fab{position:fixed;bottom:24px;right:24px;z-index:600;width:52px;height:52px;border-radius:50%;background:var(--acc2);color:#fff;border:none;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(129,140,248,.4);transition:all .22s;font-family:'Inter',sans-serif}
.chat-fab:hover{transform:scale(1.08);box-shadow:0 8px 32px rgba(129,140,248,.5)}
.chat-fab .notif{position:absolute;top:-2px;right:-2px;width:14px;height:14px;border-radius:50%;background:var(--dan);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg)}
.chat-window{position:fixed;bottom:86px;right:24px;z-index:601;width:340px;max-height:480px;background:var(--s1);border:1px solid var(--bdr);border-radius:16px;display:flex;flex-direction:column;box-shadow:0 20px 60px var(--shadow);animation:slidein .25s ease}
.chat-hdr{padding:13px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:9px;flex-shrink:0}
.chat-hdr-icon{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--acc2),var(--acc));display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.chat-hdr-name{font-size:13px;font-weight:700}
.chat-hdr-status{font-size:11px;color:var(--ok);display:flex;align-items:center;gap:4px}
.chat-hdr-status::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--ok);display:inline-block}
.chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;min-height:0}
.cmsg{max-width:82%;font-size:12px;line-height:1.6;padding:8px 11px;border-radius:12px;animation:fadein .2s ease}
.cmsg.bot{background:var(--chat-bot);color:var(--tx);border-radius:4px 12px 12px 12px;align-self:flex-start}
.cmsg.user{background:var(--acc2);color:#fff;border-radius:12px 4px 12px 12px;align-self:flex-end}
.cmsg.typing{background:var(--chat-bot);border-radius:4px 12px 12px 12px;align-self:flex-start;padding:10px 14px}
.typing-dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--tx2);animation:bk 1.3s infinite;margin:0 2px}
.typing-dots span:nth-child(2){animation-delay:.22s}.typing-dots span:nth-child(3){animation-delay:.44s}
.chat-suggestions{padding:6px 10px;display:flex;gap:5px;flex-wrap:wrap;border-top:1px solid var(--bdr);flex-shrink:0}

function makeEta(dept, daysAgo){
  const etaDays = DEPT_ETA_DAYS[dept] || 7;
  const reported = new Date(Date.now() - daysAgo*24*3600*1000);
  const etaDate = new Date(reported.getTime() + etaDays*24*3600*1000);
  const isOverdue = etaDate < new Date();
  return {
    reportedTs: reported.getTime(),
    etaTs: etaDate.getTime(),
    etaDays,
    escalated: isOverdue,
    etaLabel: etaDate.toISOString().split("T")[0],
  };
}

let _db=null,_storage=null,_fbReady=false;
async function initFB(cfg){
  try{
    const {initializeApp,getApps}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const {getFirestore,collection,addDoc,getDocs,doc,updateDoc,query,orderBy}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const {getStorage,ref,uploadString,getDownloadURL}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js");
    const apps=getApps(); const app=apps.length?apps[0]:initializeApp(cfg);
    _db=getFirestore(app); _storage=getStorage(app);
    window._fb={collection,addDoc,getDocs,doc,updateDoc,query,orderBy,ref,uploadString,getDownloadURL};
    _fbReady=true; return true;
  }catch(e){console.error(e);return false;}
}
async function fbSave(issue,images){
  if(!_fbReady||!window._fb)return null;
  const {collection,addDoc,ref,uploadString,getDownloadURL}=window._fb;
  const imageUrls=[];
  for(const b64 of (images||[])){
    try{
      const sr=ref(_storage,`issues/${Date.now()}_${Math.random().toString(36).slice(2)}.jpg`);
      await uploadString(sr,b64,"base64",{contentType:"image/jpeg"});
      imageUrls.push(await getDownloadURL(sr));
    }catch(e){console.warn(e);}
  }
  const payload={...issue,imageUrls,createdAt:new Date().toISOString()};
  delete payload.id;
  const ref2=await addDoc(window._fb.collection(_db,"civitas_issues"),payload);
  return{id:ref2.id,...payload};
}
async function fbLoadAll(){
  if(!_fbReady||!window._fb)return null;
  const {collection,getDocs,query,orderBy}=window._fb;
  const q=query(collection(_db,"civitas_issues"),orderBy("createdAt","desc"));
  const snap=await getDocs(q);
  return snap.docs.map(d=>({id:d.id,...d.data()}));
}
async function fbUpdate(id,fields){
  if(!_fbReady||!window._fb)return;
  try{await window._fb.updateDoc(window._fb.doc(_db,"civitas_issues",id),{...fields,updatedAt:new Date().toISOString()});}catch(e){}
}

// ── GEMINI ────────────────────────────────────────────────────
async function runGemini(b64,userCat,desc){
  if(!b64){
    await new Promise(r=>setTimeout(r,1200));
    const c=CMAP[userCat]||CATS[0];
    return{category:userCat,severity:"HIGH",dept:c.dept,score:91,eta:"5–8 days",
      desc:`Significant ${c.label.toLowerCase()} issue detected. ${c.dept} should address this within 48 hours.`,
      tags:[c.label,"Urgent","Public safety"],raw:"Demo mode"};
  }
  const prompt=`You are a civic issue AI for Indian cities. Analyze this photo carefully.
User selected: "${userCat}" (${CMAP[userCat]?.label||userCat})
${desc?`User description: "${desc}"`:""}

What you see in image → category:
- Water gushing/burst pipe/flooding → "water"
- Garbage/trash/overflowing bins → "garbage"
- Hole/cave-in in road → "pothole"
- Broken/unlit street lamp → "streetlight"
- Cracked/broken road/pavement → "road"
- Open manhole/sewage overflow → "sewage"
- Fallen/uprooted tree → "tree"
- Illegal construction/encroachment → "encroach"
- Other → "other"

HIGH=immediate safety risk, MEDIUM=significant inconvenience, LOW=minor
Return ONLY JSON: {"category":"<id>","severity":"HIGH|MEDIUM|LOW","dept":"<dept>","score":<0-100>,"eta":"<days>","desc":"<2 sentences>","tags":["t1","t2","t3"]}`;
  try{
    const r=await fetch("/api/gemini",
      {method:"POST",headers:{"Content-Type":"application/json"},
       body:JSON.stringify({type:"analyze",b64,mimeType:"image/jpeg",prompt})});
    const d=await r.json();
    if(d.error)throw new Error(d.error);
    const raw=d.text||"{}";
    const p=JSON.parse(raw.replace(/```json|```/g,"").trim());
    if(!p.dept)p.dept=CMAP[p.category]?.dept||"Municipal Corporation";
    p.raw=raw; return p;
  }catch(e){
    const c=CMAP[userCat]||CATS[0];
    return{category:userCat,severity:"MEDIUM",dept:c.dept,score:60,eta:"7-10 days",desc:"Analysis error. Manual review needed.",tags:[],raw:e.message};
  }
}

async function chatWithGemini(userMsg, issues, userState){
  const areaIssues = issues.filter(i=>!userState||i.state===userState.state);
  const summary = areaIssues.slice(0,10).map(i=>`[${i.severity}] ${i.title} (${i.status}, ${i.votes} votes, ${i.location})`).join('\n');
  const context = `You are CivitasBot, a helpful AI assistant for the Civitas.Ai platform — a civic issue reporting app for Indian cities.
Current user's area: ${userState?`${userState.state} › ${userState.district||''} › ${userState.area||''}`:'Not set'}
Recent issues in user's area (${areaIssues.length} total):
${summary||'No issues yet in this area.'}

You help citizens:
- Understand how to report issues (4 steps: Category → Location → Photo → AI Analysis)
- Find out status of issues in their area
- Understand what government departments handle what
- Answer questions about the platform
- Give civic advice

Be concise, friendly, and helpful. Use emojis naturally. If asked about specific issues, reference the data above.`;
  try{
    const r=await fetch("/api/gemini",
      {method:"POST",headers:{"Content-Type":"application/json"},
       body:JSON.stringify({type:"chat",prompt:context+"\n\nUser: "+userMsg+"\nCivitasBot:"})});
    const d=await r.json();
    if(d.error)throw new Error(d.error);
    return d.text||"Sorry, I couldn't process that. Try again!";
  }catch(e){return"I'm having trouble connecting right now. Try again in a moment! 🔄";}
}

function ReportModal({onClose,onSubmit,onUpvote,allIssues,defaultState,defaultDistrict,defaultArea}){
  const e=React.createElement;
  const [step,setStep]=useState(1);
  const [cat,setCat]=useState(null);
  const [images,setImages]=useState([]);
  const [b64s,setB64s]=useState([]);
  const [desc,setDesc]=useState("");
  const [state,setSt]=useState(defaultState||"");

  const [busy,setBusy]=useState(false);
  const [ai,setAi]=useState(null);
  const [dups,setDups]=useState([]);

  function checkDups(){
    const found=allIssues.filter(i=>i.category===cat&&i.state===state&&i.district===district&&i.area===area&&i.status!=="resolved");
    if(found.length>0){setDups(found);setStep(2.5);}else setStep(3);
  }

  async function analyze(){
    setStep(4);setBusy(true);
    const result=await runGemini(b64s[0],cat,desc);
    setAi(result);setBusy(false);
  }

  const [submitted,setSubmitted]=useState(null);
  function submit(){
    const c=CMAP[ai?.category||cat]||CATS[0];
    const coords=STATE_COORDS[state]||{lat:20,lng:78};
    const j=()=>(Math.random()-.5)*.05;
    const locStr=[area,district,state].filter(Boolean).join(" › ");
    const issueData={
      category:ai?.category||cat,severity:ai?.severity||"MEDIUM",dept:ai?.dept||c.dept,
      aiScore:ai?.score||70,title:desc||(c.label+" issue in "+area),
      location:locStr,area,district,state,
      lat:coords.lat+j(),lng:coords.lng+j(),
      landmark,desc:ai?.desc||desc,tags:ai?.tags||[],
      status:"open",votes:0,date:new Date().toISOString().split("T")[0],
      imageUrls:[],govtResponse:null,resolvedAt:null,

    e("div",{className:"modal"},
      e("div",{className:"mhdr"},e("div",{className:"mtitle"},"⚠️ Similar Issues Found"),e("button",{className:"mclose",onClick:onClose},"✕")),

// ── MAP ───────────────────────────────────────────────────────
function MapView({issues,filterState}){
  const mapRef=useRef(null);
  const inst=useRef(null);
  const mks=useRef([]);
  const [fCat,setFC]=useState("all");

  useEffect(()=>{
    if(!mapRef.current)return;
    if(inst.current){inst.current.remove();inst.current=null;}
    const sc=filterState&&STATE_COORDS[filterState]?STATE_COORDS[filterState]:{lat:22,lng:82};
    const zm=filterState?9:5;
    const m=L.map(mapRef.current,{center:[sc.lat,sc.lng],zoom:zm});
    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{attribution:"© CARTO",subdomains:"abcd",maxZoom:19}).addTo(m);
    inst.current=m;
    // Force redraw in case container was hidden (e.g. inside a tab) when map initialized
    setTimeout(()=>{ if(inst.current) inst.current.invalidateSize(); }, 100);
    return()=>{if(inst.current){inst.current.remove();inst.current=null;}};
  },[filterState]);

  useEffect(()=>{
    // Wait for map instance to be ready
    const m=inst.current;if(!m)return;
    mks.current.forEach(mk=>mk.remove());mks.current=[];
    const sc={HIGH:"#F87171",MEDIUM:"#FBBF24",LOW:"#34D399"};
    const toShow=issues.filter(i=>(fCat==="all"||i.category===fCat));
    toShow.forEach(issue=>{
      const c=CMAP[issue.category]||{icon:"⚠️"};
      const col=sc[issue.severity]||"#94A3B8";
      const sz=Math.max(28,28+Math.floor(issue.votes/6)*3);
      const icon=L.divIcon({className:"",
        html:`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${col}22;border:2.5px solid ${col};display:flex;align-items:center;justify-content:center;font-size:${Math.max(13,sz*.45)}px;cursor:pointer;box-shadow:0 0 10px ${col}44;transition:transform .2s">${c.icon}</div>`,
        iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
      const mk=L.marker([issue.lat,issue.lng],{icon}).addTo(m);
      mk.bindPopup(`<div style="font-family:Inter,sans-serif;min-width:190px;color:#0f172a">
        <div style="font-weight:700;font-size:13px;margin-bottom:4px">${issue.title}</div>
        <div style="font-size:11px;color:#64748B;margin-bottom:6px">📍 ${issue.location}</div>
        <span style="background:${col}22;color:${col};font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px">${issue.severity}</span>
        <span style="background:#f1f5f9;color:#475569;font-size:10px;padding:2px 7px;border-radius:10px;margin-left:4px">${issue.dept}</span>
        <div style="font-size:11px;color:#FBBF24;font-weight:600;margin-top:5px">▲ ${issue.votes} votes</div>
        ${issue.govtResponse?`<div style="font-size:10px;color:#6366f1;margin-top:4px">🏛️ ${issue.govtResponse.slice(0,60)}…</div>`:""}
      </div>`,{maxWidth:240});
      mks.current.push(mk);
    });
    // State clusters only when viewing all
    if(!filterState){
      const sc2={};issues.forEach(i=>{if(i.state)sc2[i.state]=(sc2[i.state]||0)+1;});
      Object.entries(STATE_COORDS).forEach(([s,coords])=>{
        const n=sc2[s]||0;if(!n)return;
        const ci=L.circleMarker([coords.lat,coords.lng],{radius:Math.min(10+n*5,36),fillColor:"rgba(34,211,238,.1)",fillOpacity:1,color:"#22D3EE",weight:1.5,opacity:.5}).addTo(m);
        ci.bindTooltip(`${s}: ${n} issue${n!==1?"s":""}`,{permanent:false,direction:"top"});
        mks.current.push(ci);
      });
    }
  },[issues,fCat,filterState]);

  return e("div",{className:"mapwrap"},
    e("div",{className:"maptbar"},
      e("span",{style:{fontSize:"11px",color:"var(--tx2)"}},"Filter by type:"),
      ["all",...CATS.map(c=>c.id)].map(id=>{
        const c=id==="all"?{label:"All",icon:"🗺️"}:CMAP[id];
        return e("button",{key:id,className:`fchip ${fCat===id?"on":""}`,onClick:()=>setFC(id)},c?.icon," ",c?.label);
      })

// ── ETA HELPER ────────────────────────────────────────────────
function etaStatus(issue){
  if(!issue.etaTs) return {label:"No ETA",color:"var(--tx3)",overdue:false};
  const now=Date.now();
  const diff=issue.etaTs-now;
  const days=Math.ceil(diff/(24*3600*1000));
  if(issue.status==="resolved") return {label:"✅ Resolved",color:"var(--ok)",overdue:false};
  if(days<0) return {label:"⚠️ "+Math.abs(days)+"d overdue",color:"var(--dan)",overdue:true};
  if(days===0) return {label:"⏰ Due today",color:"var(--warn)",overdue:false};
  if(days<=2) return {label:"⏰ "+days+"d left",color:"var(--warn)",overdue:false};
  return {label:days+"d left",color:"var(--ok)",overdue:false};
}

    const deptMatch  = !officer.dept  || officer.dept==="all"  || i.dept===officer.dept;
    return stateMatch && deptMatch;

  // Head officers also see escalated issues from their dept

  useEffect(()=>{
    setIssues(prev=>{
      const now=Date.now();
      let changed=false;
      const updated=prev.map(i=>{
        if(i.status==="resolved") return i;
        if(i.etaTs && now>i.etaTs && !i.escalated){changed=true;return{...i,escalated:true};}
        return i;
      });
      if(changed){saveIssues(updated);return updated;}
      return prev;
    });

      const cloud=await fbLoadAll();

    }else toast("Firebase failed. Check config.","error");

  // Auto-set fbOk when Firebase initializes
  useEffect(()=>{

          // Load cloud issues

                saveIssues(merged);
                return merged;

            }

    }
  },[]);

  function vote(id){
    const alreadyVoted=voted[id];
    const newVoted={...voted};
    if(alreadyVoted){delete newVoted[id];}else{newVoted[id]=true;}
    setVoted(newVoted);
    localStorage.setItem("civitas_voted_v1",JSON.stringify(newVoted));
    const delta=alreadyVoted?-1:1;
    setIssues(is=>{
      const u=is.map(i=>i.id===id?{...i,votes:Math.max(0,i.votes+delta)}:i);
      saveIssues(u);
      // Firebase update uses the freshly computed value, not the stale closure
      if(fbOk){const updated=u.find(i=>i.id===id);if(updated)fbUpdate(id,{votes:updated.votes});}
      return u;
    });
    toast(alreadyVoted?"Vote removed":"Vote counted!",alreadyVoted?"info":"success");
  }

    const etaDays=DEPT_ETA_DAYS[data.dept]||7;

    }
  }

  function statusChange(id,ns){

    if(fbOk)fbUpdate(id,{status:ns});
    toast("Status updated","success");
  }

// ── Firebase Auth ──────────────────────────────────────────
let _auth = null;
let _fbAuthReady = false;

async function initFirebaseAuth(cfg) {
  try {
    const { initializeApp, getApps } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
            signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged,
            updateProfile } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
    const apps = getApps();
    const app = apps.length ? apps[0] : initializeApp(cfg);
    _auth = getAuth(app);
    _fbAuthReady = true;
    window._fbAuth = { createUserWithEmailAndPassword, signInWithEmailAndPassword,
      signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged, updateProfile };
    return true;
  } catch(e) { console.error("Auth init:", e); return false; }
}

async function fbSignUp(email, pass, name) {
  if (!_fbAuthReady || !window._fbAuth) throw new Error("Firebase not initialized.");
  const { createUserWithEmailAndPassword, updateProfile } = window._fbAuth;
  const cred = await createUserWithEmailAndPassword(_auth, email, pass);
  await updateProfile(cred.user, { displayName: name });
  return cred.user;
}

async function fbSignIn(email, pass) {
  if (!_fbAuthReady || !window._fbAuth) throw new Error("Firebase not initialized.");
  const { signInWithEmailAndPassword } = window._fbAuth;
  const cred = await signInWithEmailAndPassword(_auth, email, pass);
  return cred.user;
}

async function fbGoogleSignIn() {
  if (!_fbAuthReady || !window._fbAuth) throw new Error("Firebase not initialized.");
  const { signInWithPopup, GoogleAuthProvider } = window._fbAuth;
  const provider = new GoogleAuthProvider();
  const cred = await signInWithPopup(_auth, provider);
  return cred.user;
}

async function fbSignOut() {
  if (!_fbAuthReady || !window._fbAuth) return;
  await window._fbAuth.signOut(_auth);
}

// ── Reverse Geocode via Nominatim (OpenStreetMap, free) ────
async function reverseGeocode(lat, lng) {
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&addressdetails=1`,
      { headers: { "Accept-Language": "en" } });
    const d = await r.json();
    const addr = d.address || {};
    // Map Nominatim fields to our structure
    const state = addr.state || "";
    // Find matching state in our LOC_TREE
    const matchedState = Object.keys(LOC_TREE).find(s =>
      state.toLowerCase().includes(s.toLowerCase()) ||
      s.toLowerCase().includes(state.toLowerCase().split(" ")[0])
    ) || "";
    const district = addr.county || addr.city_district || addr.suburb || addr.city || "";
    const area = addr.suburb || addr.neighbourhood || addr.quarter || addr.village || addr.town || addr.city || "";
    // Try to match district to our tree
    let matchedDistrict = "", matchedArea = "";
    if (matchedState && LOC_TREE[matchedState]) {
      const dists = Object.keys(LOC_TREE[matchedState]);
      matchedDistrict = dists.find(d =>
        district.toLowerCase().includes(d.toLowerCase().split(" ")[0]) ||
        d.toLowerCase().includes(district.toLowerCase().split(" ")[0])
      ) || dists[0];
      if (matchedDistrict) {
        const areas = LOC_TREE[matchedState][matchedDistrict] || [];
        matchedArea = areas.find(a =>
          area.toLowerCase().includes(a.toLowerCase().split(" ")[0]) ||
          a.toLowerCase().includes(area.toLowerCase().split(" ")[0])
        ) || areas[0] || "";
      }
    }
    return {
      raw: `${area}, ${district}, ${state}`,
      state: matchedState,
      district: matchedDistrict,
      area: matchedArea,
      lat, lng
    };
  } catch(e) {
    console.warn("Geocode failed:", e);
    return null;
  }
}

// ── Detect location ────────────────────────────────────────
function detectLocation() {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) { reject(new Error("Geolocation not supported")); return; }
    navigator.geolocation.getCurrentPosition(
      async pos => {
        const result = await reverseGeocode(pos.coords.latitude, pos.coords.longitude);
        if (result) resolve(result);
        else reject(new Error("Could not determine area from your location"));
      },
      err => reject(new Error("Location access denied. Please allow location or select manually.")),
      { timeout: 10000 }
    );
  });
}

// ── Gemini ID scanning ─────────────────────────────────────
async function scanGovtID(b64) {
  if (!b64) {
    await new Promise(r => setTimeout(r, 1500));
    return { dept: null, name: null, empId: null, confidence: 0,
      raw: "Demo mode — AI ID scanning active via secure backend" };
  }
  const prompt = `You are analyzing a government employee ID card / official document from India.
Extract the following information if visible:
- Employee name
- Employee/Staff ID number
- Department name (e.g. "Public Works Department", "Electricity Board", "Water Supply", "Municipal Corporation", "Health Department", "Police", "Revenue Department")
- Designation/role

Map the department to one of these categories:
- "Roads Department" (PWD, CPWD, road works, highways)
- "Electricity Board" (BESCOM, MSEDCL, DISCOM, electricity, power)  
- "Water Supply Board" (BWSSB, Jal Board, water supply, sewage, drainage)
- "Municipal Sanitation" (garbage, solid waste, sanitation, cleanliness)
- "Horticulture Dept" (parks, gardens, trees, horticulture)
- "Municipal Corporation" (general municipal, civic, BBMP, MCD, BMC)
- "Revenue Department" (land, revenue, encroachment)
- "Health Department" (health, hospital, medical)
- "Other Government" (anything else)

Return ONLY valid JSON (no markdown):
{"name":"<employee name or null>","empId":"<ID number or null>","dept":"<mapped department category>","confidence":<0-100>,"notes":"<brief note about what you detected>"}`;
  try {
    const r = await fetch("/api/gemini",
      { method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ type: "scan", b64, mimeType: "image/jpeg", prompt }) });
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    const raw = d.text || "{}";
    return JSON.parse(raw.replace(/```json|```/g, "").trim());
  } catch(e) {
    return { dept: null, name: null, empId: null, confidence: 0, raw: e.message };
  }
}

// ── LOCAL MOCK AUTH (works without Firebase) ───────────────
const LS_USERS = "civitas_users_v1";
const LS_CURUSER = "civitas_currentuser_v1";

function getLocalUsers() { try { return JSON.parse(localStorage.getItem(LS_USERS) || "[]"); } catch(e) { return []; } }
function saveLocalUsers(u) { localStorage.setItem(LS_USERS, JSON.stringify(u)); }
function getLocalUser() { try { return JSON.parse(localStorage.getItem(LS_CURUSER) || "null"); } catch(e) { return null; } }
function setLocalUser(u) { localStorage.setItem(LS_CURUSER, JSON.stringify(u)); }
function clearLocalUser() { localStorage.removeItem(LS_CURUSER); }

function mockSignUp(data) {
  const users = getLocalUsers();
  if (users.find(u => u.email === data.email)) throw new Error("Email already registered.");
  const user = { ...data, id: "u" + Date.now(), createdAt: new Date().toISOString() };
  users.push(user);
  saveLocalUsers(users);
  setLocalUser(user);
  return user;
}

function mockSignIn(email, pass) {
  const users = getLocalUsers();
  const user = users.find(u => u.email === email && u.password === pass);
  if (!user) throw new Error("Invalid email or password. Try a demo account below.");
  setLocalUser(user);
  return user;
}

  function handleIdFile(file) {
    if (!file) return;
    const r = new FileReader();
    r.onload = async ev => {
      setIdImg(ev.target.result);
      const b64 = ev.target.result.split(",")[1];
      setIdB64(b64);
      setScanning(true); setScanResult(null);
      const result = await scanGovtID(b64);
      setScanResult(result);
      if (result.dept) setDept(result.dept);
      if (result.name && !name) setName(result.name);
      if (result.empId && !empId) setEmpId(result.empId);
      setScanning(false);
    };
    r.readAsDataURL(file);
  }

  function step1Valid() {
    if (!name.trim()) { setErr("Name required"); return false; }
    if (!email.includes("@") || !email.includes(".")) { setErr("Enter a valid email address"); return false; }

    if (!state) { setErr("Select your state/city"); return false; }

    if (!email || !pass) { setErr("Fill all fields"); return; }
    setLoading(true); setErr("");
    try {
      let user;
      // Try hardcoded demo govt accounts first
      const demoAcc = GOVT_ACCOUNTS[email];
      if (demoAcc && demoAcc.pass === pass) {

        ))
      ),
      e("div", { className: "auth-switch" }, "No account? ", e("button", { onClick: onSwitchRegister }, "Register as Officer")),
      e("div", { className: "auth-switch", style: { marginTop: "8px" } },
        e("button", { onClick: onBack, style: { color: "var(--tx2)" } }, "← Back to citizen portal")
      )
    ),
    e("div", { className: "auth-right" },
      e("div", { className: "auth-feature-card" },
        e("div", { className: "auth-feature-title" }, "Your department. Your dashboard."),
        e("div", { className: "auth-feature-sub" }, "Each officer sees only issues relevant to their department — no noise, just actionable work."),
        DEPT_LIST.slice(0, 5).map((d, i) => e("div", { key: i, className: "auth-feat-row" },
          e("div", { className: "auth-feat-icon", style: { background: "rgba(129,140,248,.1)", fontSize: "16px" } },
            ["🚧","⚡","💧","🗑️","🌳"][i]
          ),
          e("div", null, e("div", { className: "auth-feat-label" }, d), e("div", { className: "auth-feat-sub" }, "Issues routed automatically by Gemini AI"))
        ))
      )
    )
  );
}

// ── Profile Menu in Nav ────────────────────────────────────
function ProfileMenu({ user, onSignOut, onSettings }) {
  const e = React.createElement;
  const [open, setOpen] = useState(false);
  const initials = (user.name || "U").split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();
  return e("div", { style: { position: "relative" } },
    user.avatar
      ? e("img", { src: user.avatar, style: { width: 36, height: 36, borderRadius: "50%", cursor: "pointer", border: "2px solid var(--acc)" }, onClick: () => setOpen(!open) })
      : e("div", { className: "profile-avatar", onClick: () => setOpen(!open) }, initials),
    open && e(React.Fragment, null,
      e("div", { style: { position: "fixed", inset: 0, zIndex: 999 }, onClick: () => setOpen(false) }),
      e("div", { className: "profile-menu" },
        e("div", { style: { padding: "8px 11px 10px", borderBottom: "1px solid var(--bdr)" } },
          e("div", { style: { fontWeight: 700, fontSize: "13px" } }, user.name || "User"),
          e("div", { style: { fontSize: "11px", color: "var(--tx2)", marginTop: "2px" } }, user.email),
          user.location && e("div", { style: { fontSize: "11px", color: "var(--acc)", marginTop: "2px" } },
            "📍 ", user.location.area || user.location.state
          ),
          user.role === "govt" && e("div", { style: { fontSize: "11px", color: "var(--acc2)", marginTop: "3px", fontWeight: 600 } },
            "🏛️ ", user.dept
          )
        ),
        e("button", { className: "profile-menu-item", style: { color: "var(--dan)" }, onClick: () => { setOpen(false); onSignOut(); } }, "🚪", " Sign Out")
      )
    )
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(ErrorBoundary,null,React.createElement(App))
);
</script>
